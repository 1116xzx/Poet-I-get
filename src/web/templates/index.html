<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>七言绝句 · 诗人我持</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f3efe7;
    --card-bg: rgba(255, 252, 246, 0.88);
    --text: #1d1d1f;
    --text-soft: #86868b;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --green: #34c759;
    --orange: #ff9500;
    --border: rgba(131, 120, 102, 0.22);
    --shadow: 0 18px 48px rgba(49, 36, 18, 0.12);
    --radius: 20px;
    --radius-sm: 12px;
  }

  html, body {
    min-height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: transparent;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(245, 240, 231, 0.36), rgba(245, 240, 231, 0.46)),
      url("{{ url_for('static', filename='beijing.png') }}") center center / cover no-repeat;
    z-index: -2;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, rgba(255,255,255,0.12), rgba(255,255,255,0.03) 42%, rgba(255,255,255,0.16));
    z-index: -1;
    pointer-events: none;
  }

  .container { width: 100%; max-width: 620px; display: flex; flex-direction: column; gap: 24px; }
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
  }
  .title { font-size: 28px; font-weight: 600; letter-spacing: .5px; text-align: center; color: var(--text); }
  .subtitle { font-size: 15px; color: var(--text-soft); text-align: center; margin-top: 6px; font-weight: 400; }

  .toggle-group { display: flex; gap: 0; background: #f0f0f3; border-radius: var(--radius-sm); padding: 3px; }
  .toggle-btn {
    flex: 1; padding: 12px 0; border: none; background: transparent; font-size: 15px;
    font-weight: 500; color: var(--text-soft); cursor: pointer; border-radius: 10px;
    transition: all .25s; font-family: inherit;
  }
  .toggle-btn.active { background: #fff; color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

  .prompt-wrap {
    display: flex; flex-direction: column; gap: 8px; background: #f6f6f9; border-radius: var(--radius-sm);
    border: 1.5px solid transparent; transition: border-color .2s, box-shadow .2s;
    overflow: hidden; position: relative; padding: 14px 16px 12px;
  }
  .prompt-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,.12); }
  .prompt-wrap input {
    width: 100%; border: none; background: transparent; font-size: 24px;
    outline: none; color: var(--text); font-family: "PingFang SC", "Microsoft YaHei", serif;
    letter-spacing: 4px; min-width: 0;
  }
  .prompt-wrap input::placeholder { color: #c7c7cc; letter-spacing: 2px; font-size: 16px; }
  .prompt-meta {
    display: flex; justify-content: space-between; gap: 12px;
    font-size: 13px; color: var(--text-soft);
  }

  .slider-group { display: flex; flex-direction: column; gap: 14px; }
  .slider-row { display: flex; align-items: center; gap: 12px; }
  .slider-label { width: 86px; font-size: 13px; color: var(--text-soft); text-align: right; flex-shrink: 0; }
  .slider-row input[type=range] {
    flex: 1; -webkit-appearance: none; height: 6px; background: #e5e5ea; border-radius: 3px; outline: none;
  }
  .slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
    background: #fff; border: 1.5px solid var(--border); box-shadow: 0 1px 3px rgba(0,0,0,.1); cursor: pointer;
  }
  .slider-val { width: 42px; font-size: 14px; font-weight: 500; text-align: center; color: var(--text); }

  .switch-list {
    display: flex; flex-direction: column; gap: 14px; margin-top: 20px;
    padding-top: 20px; border-top: 1px solid #f0f0f3;
  }
  .slider-group.hidden { display: none; }
  .switch-list.hidden { display: none; }
  .switch-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .switch-copy strong { display: block; font-size: 14px; font-weight: 600; }
  .switch-copy span { display: block; font-size: 12px; color: var(--text-soft); margin-top: 3px; line-height: 1.45; }
  .model-group { display: flex; gap: 6px; flex-wrap: nowrap; justify-content: flex-end; }
  .switch-btn {
    padding: 10px 24px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: all .25s; letter-spacing: .5px; background: #fff; color: var(--text);
    border: 1.5px solid var(--border); box-shadow: 0 1px 3px rgba(0,0,0,.04); flex-shrink: 0;
  }
  .model-btn { padding: 8px 12px; font-size: 12px; letter-spacing: 0; }
  .switch-btn:hover { border-color: #c7c7cc; }
  .switch-btn.active { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,.12); }
  .switch-btn.disabled { opacity: .4; pointer-events: none; }

  .rhyme-options { display: none; margin-top: 12px; padding: 14px; background: #f9f9fb; border-radius: var(--radius-sm); }
  .rhyme-options.show { display: block; }
  .stepper-row { display: flex; align-items: center; gap: 12px; }
  .stepper-label { font-size: 13px; color: var(--text-soft); }
  .stepper-btn {
    width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: #fff;
    font-size: 18px; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; transition: all .15s;
  }
  .stepper-btn:hover { border-color: var(--accent); color: var(--accent); }
  .stepper-input {
    width: 52px; height: 32px; border: 1.5px solid var(--border); border-radius: 8px; text-align: center;
    font-size: 16px; font-weight: 600; font-family: inherit; color: var(--text); background: #fff; outline: none;
    transition: border-color .2s; -moz-appearance: textfield;
  }
  .stepper-input::-webkit-inner-spin-button, .stepper-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .stepper-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,.12); }
  .mode-intro {
    display: none;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid #f0f0f3;
  }
  .mode-intro.show { display: block; }
  .intro-box {
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    background: #f7f7fa;
    border: 1px solid #ececf1;
  }
  .intro-box strong {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .intro-box p {
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.7;
  }

  .btn-generate {
    width: 100%; padding: 16px 0; border: none; background: var(--accent); color: #fff; font-size: 17px;
    font-weight: 600; font-family: inherit; border-radius: var(--radius-sm); cursor: pointer;
    transition: background .2s, transform .1s, box-shadow .2s; letter-spacing: 1px; margin-top: 22px;
  }
  .btn-generate:hover { background: var(--accent-hover); }
  .btn-generate:active { transform: scale(.98); }

  .poem-card {
    background: var(--card-bg); border-radius: var(--radius); padding: 40px 32px;
    box-shadow: var(--shadow); min-height: 220px; display: flex; align-items: center;
    justify-content: center; transition: opacity .3s; flex-direction: column;
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
  }
  .poem-empty { text-align: center; color: #c7c7cc; font-size: 15px; line-height: 2; }
  .poem-lines, .poem-ruby {
    width: 100%; font-size: 26px; line-height: 2.2; letter-spacing: 3px; text-align: center;
    color: var(--text); font-family: "PingFang SC", "Songti SC", "STSong", "Noto Serif CJK SC", serif;
  }
  .poem-lines span, .poem-ruby span { display: block; margin-bottom: 6px; }
  .poem-ruby rt {
    font-size: 11px; color: var(--accent); letter-spacing: 1px;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; font-weight: 500;
  }
  .poem-meta {
    margin-top: 20px; font-size: 12px; color: var(--text-soft); text-align: center;
    display: flex; justify-content: center; flex-wrap: wrap; gap: 8px;
  }
  .meta-chip, .rhyme-badge {
    display: inline-flex; align-items: center; justify-content: center; min-height: 28px;
    padding: 0 10px; border-radius: 999px; border: 1px solid #ececf1; background: #fafafc;
  }
  .rhyme-badge.good { color: #1a7d3b; background: #e8f8ed; border-color: #d5f0dd; }
  .rhyme-badge.ok { color: #b8600a; background: #fff3e0; border-color: #ffe2ba; }
  .rhyme-badge.poor { color: #b3261e; background: #fce8e6; border-color: #f5cfc9; }

  .candidates-section { margin-top: 24px; width: 100%; border-top: 1px solid #f0f0f3; padding-top: 20px; }
  .candidates-title { font-size: 12px; color: var(--text-soft); letter-spacing: 1px; margin-bottom: 12px; }
  .grid-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 6px;
    text-align: center;
    font-size: 22px;
    font-family: "PingFang SC", "Songti SC", serif;
  }
  .grid-table td {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: #f7f7fa;
    border: 1px solid #ececf1;
  }
  .candidate-row {
    display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px;
    font-size: 14px; cursor: pointer; transition: background .15s; position: relative;
  }
  .candidate-row:hover { background: #f0f4ff; }
  .candidate-row.best { background: #e8f0fe; }
  .candidate-rank { font-size: 11px; color: var(--text-soft); width: 20px; flex-shrink: 0; }
  .candidate-text { flex: 1; letter-spacing: 1px; font-family: "PingFang SC", "Songti SC", serif; word-break: break-all; }
  .candidate-score { font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .candidate-subscore { font-size: 10px; color: var(--text-soft); flex-shrink: 0; min-width: 52px; text-align: right; }
  .candidate-best-tag { font-size: 10px; color: var(--accent); font-weight: 600; flex-shrink: 0; }

  .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #e5e5ea; border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { text-align: center; color: #ff3b30; font-size: 14px; padding: 8px 0; }

  #controlsCard.generating input,
  #controlsCard.generating button:not(#btnGenerate):not(.kid-btn),
  #controlsCard.generating .toggle-btn { pointer-events: none; opacity: .5; }

  .kid-btn {
    position: fixed; top: 14px; right: 14px; z-index: 100; padding: 4px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all .25s;
    background: rgba(255,255,255,.85); color: var(--text); border: 1px solid var(--border); backdrop-filter: blur(4px);
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .kid-btn:hover { border-color: #c7c7cc; background: #fff; }
  .kid-btn.active { color: #e85d3a; border-color: #e85d3a; background: rgba(255,255,255,.95); box-shadow: 0 0 0 3px rgba(232,93,58,.12); }

  @media (max-width: 480px) {
    .card, .poem-card { padding: 24px 18px; }
    .poem-lines, .poem-ruby { font-size: 20px; line-height: 2; }
    .prompt-wrap input { font-size: 20px; letter-spacing: 2px; }
    .prompt-meta { flex-direction: column; align-items: flex-start; gap: 4px; }
    .switch-row { align-items: flex-start; }
  }
</style>
</head>
<body>

<button class="kid-btn" id="kidBtn">幼儿模式</button>

<div class="container">
  <div>
    <h1 class="title">诗人我持</h1>
    <p class="subtitle">GRU 七言绝句生成</p>
  </div>

  <div class="card" id="controlsCard">
    <div class="toggle-group" id="toggleGroup">
      <button class="toggle-btn active" data-mode="continue">首句续写</button>
      <button class="toggle-btn" data-mode="acrostic">藏头诗</button>
      <button class="toggle-btn" data-mode="chengyu">成积似涵</button>
    </div>

    <div style="margin-top:20px;">
      <div class="prompt-wrap">
        <input type="text" id="promptInput" placeholder="输入首句七言" maxlength="7" autocomplete="off">
        <div class="prompt-meta">
          <span id="promptDesc">输入七字成首句，诗人我持后三句</span>
          <span id="charHint">0 / 7</span>
        </div>
      </div>
    </div>

    <div class="slider-group" id="samplingGroup" style="margin-top:20px;">
      <div class="slider-row">
        <span class="slider-label">Temperature</span>
        <input type="range" id="temperature" min="0.3" max="1.5" step="0.05" value="1.0">
        <span class="slider-val" id="tempVal">1.0</span>
      </div>
    </div>

    <div class="switch-list" id="switchList">
      <div class="switch-row">
        <div class="switch-copy">
          <strong>三模型选择</strong>
        </div>
        <div class="model-group" id="modelGroup">
          <button class="switch-btn model-btn active" data-model="baseline">baseline</button>
          <button class="switch-btn model-btn" data-model="weighted">weighted</button>
          <button class="switch-btn model-btn" data-model="structured">structured</button>
        </div>
      </div>

      <div>
        <div class="switch-row">
          <div class="switch-copy">
            <strong>押韵优化</strong>
            <span>多首候选同步生，韵脚最优自动呈。</span>
          </div>
          <button class="switch-btn" id="rhymeBtn">关</button>
        </div>

        <div class="rhyme-options" id="rhymeOptions">
          <div class="stepper-row">
            <span class="stepper-label">候选数量</span>
            <button class="stepper-btn" id="candMinus">−</button>
            <input type="number" class="stepper-input" id="candCount" value="10" min="3" max="50">
            <button class="stepper-btn" id="candPlus">+</button>
          </div>
          <p style="font-size:11px;color:var(--text-soft);margin-top:8px;line-height:1.5;">
            候选越多越容易挑到更顺的韵脚，但生成时间也会变长。
          </p>
        </div>
      </div>
    </div>

    <div class="mode-intro" id="chengyuIntro">
      <div class="intro-box">
        <strong>成积似涵简介</strong>
        <p>该模式固定使用 structured 模型。系统会根据输入的四字藏头搜索成语字阵候选，再结合全局一致性、重复惩罚与押韵分自动挑出更像诗的结果。</p>
      </div>
    </div>

    <button class="btn-generate" id="btnGenerate">生成</button>
  </div>

  <div class="poem-card">
    <div class="poem-empty" id="poemEmpty">点击“生成”按钮后，<br>让我用最简单，最通俗易懂，最直接，最不拐弯抹角，最接地气，最大白话，最一针见血，最切中要害，最直击灵魂，最一语道破，最醍醐灌顶，最茅塞顿开的方式告诉你这首七绝诗怎么样</div>
    <div id="poemContent" style="display:none;width:100%"></div>
  </div>
</div>

<script>
const state = { mode: "continue", model: "baseline", rhymeOn: false, kidMode: false, candCount: 10, generating: false, abortController: null };

const $ = (id) => document.getElementById(id);
const toggleGroup = $("toggleGroup");
const promptInput = $("promptInput");
const charHint = $("charHint");
const promptDesc = $("promptDesc");
const tempSlider = $("temperature");
const samplingGroup = $("samplingGroup");
const btnGen = $("btnGenerate");
const poemEmpty = $("poemEmpty");
const poemContent = $("poemContent");
const switchList = $("switchList");
const chengyuIntro = $("chengyuIntro");
const modelGroup = $("modelGroup");
const rhymeBtn = $("rhymeBtn");
const rhymeOptions = $("rhymeOptions");
const candCountEl = $("candCount");
const candMinus = $("candMinus");
const candPlus = $("candPlus");
const kidBtn = $("kidBtn");

function syncModelButtons() {
  modelGroup.querySelectorAll(".switch-btn").forEach((item) => {
    item.classList.toggle("active", item.dataset.model === state.model);
  });
}

function syncModeControls() {
  const isChengyu = state.mode === "chengyu";
  switchList.classList.toggle("hidden", isChengyu);
  chengyuIntro.classList.toggle("show", isChengyu);
  samplingGroup.classList.toggle("hidden", isChengyu);
  if (isChengyu) {
    state.model = "structured";
    state.rhymeOn = false;
    rhymeBtn.classList.remove("active");
    rhymeBtn.classList.add("disabled");
    rhymeBtn.textContent = "关";
    rhymeOptions.classList.remove("show");
    syncModelButtons();
  } else {
    rhymeBtn.classList.remove("disabled");
  }
}

toggleGroup.addEventListener("click", (e) => {
  const btn = e.target.closest(".toggle-btn");
  if (!btn) return;
  state.mode = btn.dataset.mode;
  toggleGroup.querySelectorAll(".toggle-btn").forEach((b) => b.classList.remove("active"));
  btn.classList.add("active");

  const limit = state.mode === "continue" ? 7 : 4;
  promptInput.maxLength = limit;
  promptInput.value = "";
  updateCharHint();

  if (state.mode === "continue") {
    promptInput.placeholder = "输入首句七言";
    promptDesc.textContent = "输入七字成首句，诗人我持后三句";
  } else if (state.mode === "acrostic") {
    promptInput.placeholder = "输入四个藏头字";
    promptDesc.textContent = "四字藏头先输入，诗人我持自动出";
  } else {
    promptInput.placeholder = "输入四个藏头字";
    promptDesc.textContent = "四字藏头先输入，成积似涵自动出";
  }
  syncModeControls();
});

function updateCharHint() {
  const max = state.mode === "continue" ? 7 : 4;
  charHint.textContent = `${promptInput.value.length} / ${max}`;
}
promptInput.addEventListener("input", updateCharHint);

function syncSlider(slider, display) {
  display.textContent = slider.value;
  slider.addEventListener("input", () => { display.textContent = slider.value; });
}
syncSlider(tempSlider, $("tempVal"));

modelGroup.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-model]");
  if (!btn || state.generating) return;
  state.model = btn.dataset.model;
  syncModelButtons();
});

rhymeBtn.addEventListener("click", () => {
  if (state.generating || state.mode === "chengyu") return;
  state.rhymeOn = !state.rhymeOn;
  rhymeBtn.classList.toggle("active", state.rhymeOn);
  rhymeBtn.textContent = state.rhymeOn ? "开" : "关";
  rhymeOptions.classList.toggle("show", state.rhymeOn);
  if (state.rhymeOn) {
    state.model = "structured";
    syncModelButtons();
  }
});

kidBtn.addEventListener("click", () => {
  state.kidMode = !state.kidMode;
  kidBtn.classList.toggle("active", state.kidMode);
  kidBtn.textContent = state.kidMode ? "退出幼儿模式" : "幼儿模式";
  const pc = $("poemContent");
  if (pc.style.display !== "none" && pc.dataset.lines) {
    renderDisplay(
      JSON.parse(pc.dataset.lines),
      pc.dataset.mode,
      pc.dataset.seed,
      pc.dataset.rhymeScore,
      pc.dataset.candidates ? JSON.parse(pc.dataset.candidates) : null,
      parseInt(pc.dataset.numCandidates || "0", 10),
      state.kidMode,
      !!pc.dataset.candidates,
      pc.dataset.model || "baseline",
    );
  }
});

function clamp(val) {
  return Math.max(3, Math.min(50, val));
}

candCountEl.addEventListener("input", () => {
  const n = parseInt(candCountEl.value, 10);
  if (!Number.isNaN(n) && n >= 3 && n <= 50) state.candCount = n;
});

candCountEl.addEventListener("blur", () => {
  const n = parseInt(candCountEl.value, 10);
  if (Number.isNaN(n)) {
    candCountEl.value = state.candCount;
  } else {
    state.candCount = clamp(n);
    candCountEl.value = state.candCount;
  }
});

candMinus.addEventListener("click", () => {
  state.candCount = clamp(state.candCount - 1);
  candCountEl.value = state.candCount;
});
candPlus.addEventListener("click", () => {
  state.candCount = clamp(state.candCount + 1);
  candCountEl.value = state.candCount;
});

function rhymeBadge(score) {
  if (score >= 50) return `<span class="rhyme-badge good">押韵优秀 ${Math.round(score)}分</span>`;
  if (score >= 25) return `<span class="rhyme-badge ok">押韵一般 ${Math.round(score)}分</span>`;
  return `<span class="rhyme-badge poor">押韵较弱 ${Math.round(score)}分</span>`;
}

async function renderWithPinyin(lines) {
  const text = lines.join("");
  try {
    const res = await fetch("/api/pinyin", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });
    const data = await res.json();
    if (!data.ok) return null;
    const annotations = data.annotations;
    let idx = 0;
    return lines.map((line) => {
      const chars = [];
      for (let ci = 0; ci < line.length; ci += 1) {
        const ann = annotations[idx];
        chars.push(`<ruby>${ann.char}<rt>${ann.pinyin}</rt></ruby>`);
        idx += 1;
      }
      return `<span>${chars.join("")}</span>`;
    });
  } catch {
    return null;
  }
}

function buildGridHtml(columns) {
  if (!columns || !columns.length) return "";
  const rows = [0, 1, 2, 3].map((rowIdx) => `<tr>${columns.map((column) => `<td>${column[rowIdx] || ""}</td>`).join("")}</tr>`).join("");
  const labels = columns.map((column, idx) => `<span class="meta-chip">${idx === 0 ? `首列：${column}` : `第${idx + 1}列：${column}`}</span>`).join("");
  return `
    <div class="candidates-section">
      <div class="candidates-title">字阵</div>
      <div style="overflow:auto;">
        <table class="grid-table">
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="poem-meta" style="margin-top:10px;">${labels}</div>
    </div>
  `;
}

async function renderDisplay(lines, mode, seed, rhymeScore, allCandidates, numCandidates, kidMode, showCandidates, modelName, extraData = {}) {
  poemEmpty.style.display = "none";
  poemContent.style.display = "block";
  poemContent.dataset.lines = JSON.stringify(lines);
  poemContent.dataset.mode = mode;
  poemContent.dataset.seed = seed;
  poemContent.dataset.rhymeScore = rhymeScore !== undefined && rhymeScore !== null ? String(rhymeScore) : "";
  poemContent.dataset.candidates = showCandidates && allCandidates ? JSON.stringify(allCandidates) : "";
  poemContent.dataset.numCandidates = showCandidates ? String(numCandidates) : "0";
  poemContent.dataset.model = modelName;
  poemContent.dataset.gridColumns = extraData.gridColumns ? JSON.stringify(extraData.gridColumns) : "";
  poemContent.dataset.modeExtra = JSON.stringify(extraData || {});

  let poemHtml;
  if (kidMode) {
    const rubyLines = await renderWithPinyin(lines);
    poemHtml = rubyLines
      ? `<div class="poem-ruby">${rubyLines.join("")}</div>`
      : `<div class="poem-lines">${lines.map((l) => `<span>${l}</span>`).join("")}</div>`;
  } else {
    poemHtml = `<div class="poem-lines">${lines.map((l) => `<span>${l}</span>`).join("")}</div>`;
  }

  const meta = [
    `<span class="meta-chip">${mode === "continue" ? "首句续写" : mode === "acrostic" ? "藏头诗" : "成积似涵"}</span>`,
    `<span class="meta-chip">${modelName}</span>`,
  ];
  if (mode !== "chengyu" && rhymeScore !== undefined && rhymeScore !== null) {
    meta.push(rhymeBadge(Number(rhymeScore)));
  }
  if (mode === "chengyu" && extraData.score !== undefined) {
    meta.push(`<span class="meta-chip">综合分 ${Number(extraData.score).toFixed(2)}</span>`);
    meta.push(`<span class="meta-chip">NLL ${Number(extraData.nll).toFixed(2)}</span>`);
    if (extraData.rhymeScore !== undefined && extraData.rhymeScore !== null) {
      meta.push(rhymeBadge(Number(extraData.rhymeScore)));
    }
  }

  let candidatesHtml = "";
  const gridHtml = mode === "chengyu" ? buildGridHtml(extraData.gridColumns || []) : "";
  if (showCandidates && allCandidates && allCandidates.length > 1) {
    const currentText = lines.join("");
    let selectedIdx = allCandidates.findIndex((c) => c.lines.join("") === currentText);
    if (selectedIdx < 0) selectedIdx = 0;

    candidatesHtml = `<div class="candidates-section"><div class="candidates-title">候选排行（共 ${numCandidates} 首，点击切换）</div>`;
    allCandidates.forEach((c, i) => {
      const value = mode === "chengyu" ? c.score : c.rhyme_score;
      const scoreColor = value >= 50 ? "var(--green)" : value >= 25 ? "var(--orange)" : "#b3261e";
      const subScore = mode === "chengyu" && c.rhyme_score !== undefined
        ? `<span class="candidate-subscore">韵 ${Math.round(c.rhyme_score)}</span>`
        : "";
      candidatesHtml += `<div class="candidate-row ${i === selectedIdx ? "best" : ""}" data-cand-idx="${i}">
        <span class="candidate-rank">#${i + 1}</span>
        <span class="candidate-text">${c.lines.join(" / ")}</span>
        <span class="candidate-score" style="color:${scoreColor}">${value}</span>
        ${subScore}
        ${i === selectedIdx ? '<span class="candidate-best-tag">当前</span>' : ""}
      </div>`;
    });
    candidatesHtml += `</div>`;
  }

  poemContent.innerHTML = `${poemHtml}<div class="poem-meta">${meta.join("")}</div>${gridHtml}${candidatesHtml}`;

  poemContent.querySelectorAll(".candidate-row").forEach((row) => {
    row.addEventListener("click", () => {
      const idx = parseInt(row.dataset.candIdx, 10);
      if (Number.isNaN(idx) || !allCandidates[idx]) return;
      const cand = allCandidates[idx];
      renderDisplay(
        cand.lines,
        mode,
        seed,
        mode === "chengyu" ? null : cand.rhyme_score,
        allCandidates,
        numCandidates,
        kidMode,
        showCandidates,
        modelName,
        {
          gridColumns: cand.columns || [],
          score: cand.score,
          nll: cand.nll,
          repeatPenalty: cand.repeat_penalty,
          rhymeScore: cand.rhyme_score,
        },
      );
    });
  });
}

btnGen.addEventListener("click", async () => {
  if (state.generating) {
    if (state.abortController) state.abortController.abort();
    return;
  }

  const prompt = promptInput.value.trim();
  const max = state.mode === "continue" ? 7 : 4;
  if (prompt.length !== max) {
    promptInput.focus();
    promptInput.style.boxShadow = "0 0 0 3px rgba(255,59,48,.2)";
    setTimeout(() => { promptInput.style.boxShadow = ""; }, 800);
    return;
  }

  state.generating = true;
  state.abortController = new AbortController();
  rhymeBtn.classList.add("disabled");
  $("controlsCard").classList.add("generating");
  btnGen.textContent = "取消";
  btnGen.style.background = "#ff3b30";
  poemContent.style.display = "none";
  poemEmpty.style.display = "block";
  poemEmpty.innerHTML = '<div class="spinner"></div>';

  try {
    const endpoint = state.rhymeOn && state.mode !== "chengyu" ? "/api/generate_best" : "/api/generate";
    const body = {
      mode: state.mode,
      model: state.mode === "chengyu" ? "structured" : state.model,
      prompt,
      temperature: parseFloat(tempSlider.value),
      rhyme_constraint: state.rhymeOn && state.mode !== "chengyu",
    };
    if (state.rhymeOn && state.mode !== "chengyu") body.num_candidates = state.candCount;
    if (state.mode === "chengyu") body.num_candidates = Math.min(state.candCount, 10);

    const res = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
      signal: state.abortController.signal,
    });
    const data = await res.json();

    if (!data.ok) {
      poemEmpty.innerHTML = `<span class="error-msg">${data.error}</span>`;
    } else {
      renderDisplay(
        data.lines,
        data.mode,
        data.seed,
        data.rhyme_score,
        data.all_candidates,
        data.num_candidates,
        state.kidMode,
        state.rhymeOn || state.mode === "chengyu",
        data.model || state.model,
        {
          gridColumns: data.grid_columns || [],
          score: data.score,
          nll: data.nll,
          repeatPenalty: data.repeat_penalty,
          rhymeScore: data.rhyme_score,
        },
      );
    }
  } catch (err) {
    if (err.name === "AbortError") {
      poemEmpty.innerHTML = '<span style="color:var(--text-soft)">已取消生成</span>';
    } else {
      poemEmpty.innerHTML = `<span class="error-msg">网络请求失败: ${err.message}</span>`;
    }
  } finally {
    state.generating = false;
    state.abortController = null;
    rhymeBtn.classList.remove("disabled");
    $("controlsCard").classList.remove("generating");
    btnGen.textContent = "生成";
    btnGen.style.background = "";
  }
});

promptInput.addEventListener("keydown", (e) => { if (e.key === "Enter") btnGen.click(); });
updateCharHint();
syncModeControls();
</script>
