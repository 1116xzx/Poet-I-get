seed: 42
device: auto

data:
  data_dir: data/processed/qijue
  vocab_path: data/processed/qijue/vocab.json
  max_train_poems: 0
  max_valid_poems: 0

model:
  token_emb_dim: 256
  row_emb_dim: 16
  col_emb_dim: 16
  hidden_size: 256
  num_layers: 2
  dropout: 0.2
  same_row_weight: 1.0
  adjacent_row_weight: 0.45
  far_row_weight: 0.2

train:
  batch_size: 512
  epochs: 20
  learning_rate: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  num_workers: 0
  run_dir: runs/global_prefix_bigru_20e
  checkpoint_path: checkpoints/global_prefix_bigru_20e.pt
