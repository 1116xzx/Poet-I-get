seed: 42
device: auto

data:
  data_dir: data/processed/qijue
  vocab_path: data/processed/qijue/vocab.json
  tasks: [free, continue, acrostic]

model:
  rnn_type: gru
  emb_dim: 256
  pos_dim: 32
  hidden_size: 512
  num_layers: 2
  dropout: 0.2
  max_len: 64

train:
  batch_size: 256
  epochs: 20
  learning_rate: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  num_workers: 0
  run_dir: runs/gru_base
  checkpoint_path: checkpoints/gru_best.pt
